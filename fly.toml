app = "squat-api-docker"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

[env]
  PORT = "8080"
  DEBUG = "1"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [services.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
